<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet Tracker — Live Dashboard</title>
    <meta name="description" content="Real-time distributed spatio-temporal fleet tracking dashboard for Mumbai vehicle fleet" />

    <!-- Leaflet — 100% free, no sign-up, no API key required -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Google Fonts — Inter for clean UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        /* ================================================================
           Design System — Dark theme inspired by modern fleet dashboards
           ================================================================ */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161e;
            --bg-glass: rgba(22, 22, 30, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --text-primary: #e8e8ed;
            --text-secondary: #8b8b9e;
            --text-muted: #555566;
            --accent-teal: #2dd4bf;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --accent-coral: #f97316;
            --glow-teal: 0 0 20px rgba(45, 212, 191, 0.3);
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Consolas', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ================================================================
           Layout — Full-screen map with floating sidebar
           ================================================================ */
        #map {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* Fix Leaflet's default tile gap on dark bg */
        .leaflet-container {
            background: #0a0a0f !important;
        }

        /* Darken Leaflet attribution bar */
        .leaflet-control-attribution {
            background: rgba(10, 10, 15, 0.75) !important;
            color: #555 !important;
            font-size: 10px !important;
        }
        .leaflet-control-attribution a { color: #777 !important; }

        /* Style zoom controls to match dark theme */
        .leaflet-control-zoom a {
            background: var(--bg-card) !important;
            color: var(--text-primary) !important;
            border-color: var(--border) !important;
        }
        .leaflet-control-zoom a:hover {
            background: var(--bg-secondary) !important;
        }

        /* Sidebar — floating glassmorphism panel */
        #sidebar {
            position: fixed;
            top: 16px;
            left: 16px;
            bottom: 16px;
            width: 340px;
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* Header */
        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header h1 .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-teal);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(45, 212, 191, 0); }
        }

        .sidebar-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-family: var(--font-mono);
        }

        /* Stats strip */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        .stat-box {
            text-align: center;
        }

        .stat-box .stat-value {
            font-family: var(--font-mono);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-teal);
        }

        .stat-box .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Vehicle list */
        .vehicle-list-header {
            padding: 12px 20px 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        #vehicle-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        #vehicle-list::-webkit-scrollbar { width: 4px; }
        #vehicle-list::-webkit-scrollbar-track { background: transparent; }
        #vehicle-list::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

        .vehicle-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .vehicle-item:hover {
            background: rgba(255,255,255,0.04);
        }

        .vehicle-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .vehicle-status-dot.moving { background: var(--accent-green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
        .vehicle-status-dot.slow { background: var(--accent-amber); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
        .vehicle-status-dot.stopped { background: var(--accent-red); box-shadow: 0 0 6px rgba(239,68,68,0.5); }

        .vehicle-info {
            flex: 1;
            min-width: 0;
        }

        .vehicle-id {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
        }

        .vehicle-detail {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .vehicle-speed {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            flex-shrink: 0;
        }

        .vehicle-speed .unit {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-footer a {
            color: var(--accent-teal);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .sidebar-footer a:hover {
            color: var(--accent-blue);
        }

        .ws-status {
            font-size: 11px;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ws-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .ws-status .dot.connected { background: var(--accent-green); }
        .ws-status .dot.disconnected { background: var(--accent-red); }

        /* ================================================================
           Geofence breach alerts — bottom-right floating cards
           ================================================================ */
        #breach-panel {
            position: fixed;
            bottom: 16px;
            right: 16px;
            width: 320px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .breach-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-left: 3px solid var(--accent-red);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            transition: all 0.2s ease;
            pointer-events: auto;
        }

        .breach-card.flash {
            animation: flashRed 0.6s ease-out;
        }

        @keyframes flashRed {
            0% { background: rgba(239, 68, 68, 0.5); transform: scale(1.02); }
            100% { background: var(--bg-glass); transform: scale(1); }
        }

        .breach-card .breach-vid {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--accent-red);
        }

        .breach-card .breach-time {
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 10px;
            margin-top: 2px;
        }

        /* ================================================================
           Leaflet popup — dark themed
           ================================================================ */
        .leaflet-popup-content-wrapper {
            background: var(--bg-card) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            color: var(--text-primary) !important;
            font-family: var(--font-sans) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
        }

        .leaflet-popup-tip {
            background: var(--bg-card) !important;
            border: 1px solid var(--border) !important;
        }

        .leaflet-popup-close-button {
            color: var(--text-secondary) !important;
            font-size: 18px !important;
        }

        .popup-title {
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--accent-teal);
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 3px 0;
        }

        .popup-row .label { color: var(--text-secondary); }
        .popup-row .value { font-family: var(--font-mono); font-weight: 500; }

        /* Arrow marker icon — remove Leaflet defaults */
        .vehicle-marker-icon {
            background: none !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <!-- Map container -->
    <div id="map"></div>

    <!-- Floating sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h1>
                <span class="pulse-dot"></span>
                Fleet Tracker
            </h1>
            <div class="sidebar-meta" id="meta-info">Connecting...</div>
        </div>

        <div class="stats-strip">
            <div class="stat-box">
                <div class="stat-value" id="stat-vehicles">—</div>
                <div class="stat-label">Vehicles</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stat-avg-speed">—</div>
                <div class="stat-label">Avg km/h</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stat-breaches">—</div>
                <div class="stat-label">Breaches</div>
            </div>
        </div>

        <div class="vehicle-list-header">
            <span>Vehicle</span>
            <span>Speed</span>
        </div>
        <div id="vehicle-list"></div>

        <div class="sidebar-footer">
            <a href="dataflow.html" id="link-dataflow">Data Flow Visualiser →</a>
            <div class="ws-status">
                <div class="dot disconnected" id="ws-dot"></div>
                <span id="ws-label">offline</span>
            </div>
        </div>
    </div>

    <!-- Geofence breach panel -->
    <div id="breach-panel"></div>

    <script>
        // ==================================================================
        // Configuration
        // ==================================================================
        const WS_URL = 'ws://localhost:8000/ws/live';
        const API_BASE = 'http://localhost:8000';

        // Mumbai centre
        const MUMBAI_CENTER = [19.07, 72.87]; // Leaflet uses [lat, lng]

        // Geofence polygon (BKC Zone) — matches processor/consumer.py
        // Leaflet uses [lat, lng] order
        const GEOFENCE_COORDS = [
            [19.065, 72.860],
            [19.065, 72.875],
            [19.075, 72.875],
            [19.075, 72.860],
            [19.065, 72.860],
        ];

        // Vehicle colors — consistent palette for up to 20 vehicles
        const VEHICLE_COLORS = [
            '#2dd4bf', '#3b82f6', '#8b5cf6', '#f59e0b', '#ef4444',
            '#22c55e', '#f97316', '#ec4899', '#06b6d4', '#84cc16',
            '#a78bfa', '#fb923c', '#34d399', '#f472b6', '#38bdf8',
            '#facc15', '#c084fc', '#4ade80', '#fb7185', '#67e8f9',
        ];

        // ==================================================================
        // Map Initialisation — Leaflet + CartoDB Dark Matter (free, no key)
        // ==================================================================
        const map = L.map('map', {
            center: MUMBAI_CENTER,
            zoom: 13,
            zoomControl: true,
        });

        // CartoDB Dark Matter — beautiful dark tile layer, 100% free
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19,
        }).addTo(map);

        // Track markers
        const markers = {};
        let lastBreachCount = 0;

        // ==================================================================
        // Geofence Polygon on Map
        // ==================================================================
        const geofencePolygon = L.polygon(GEOFENCE_COORDS, {
            color: '#ef4444',
            weight: 2,
            dashArray: '8, 5',
            opacity: 0.6,
            fillColor: '#ef4444',
            fillOpacity: 0.06,
        }).addTo(map);

        // Geofence label tooltip
        geofencePolygon.bindTooltip('⚠ BKC Zone', {
            permanent: true,
            direction: 'center',
            className: 'geofence-tooltip',
        });

        // Style the geofence tooltip
        const tooltipStyle = document.createElement('style');
        tooltipStyle.textContent = `
            .geofence-tooltip {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                color: #ef4444 !important;
                font-family: 'JetBrains Mono', monospace !important;
                font-size: 12px !important;
                font-weight: 600 !important;
                text-shadow: 0 0 8px rgba(239,68,68,0.4), 0 1px 3px rgba(0,0,0,0.8) !important;
            }
            .geofence-tooltip::before { display: none !important; }
        `;
        document.head.appendChild(tooltipStyle);

        // ==================================================================
        // Create / Update Vehicle Markers
        // ==================================================================
        function getVehicleColor(vid) {
            const idx = parseInt(vid.replace('V', '')) - 1;
            return VEHICLE_COLORS[idx % VEHICLE_COLORS.length];
        }

        function createArrowSVG(color, heading) {
            return `
                <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                    <g transform="rotate(${heading}, 16, 16)">
                        <circle cx="16" cy="16" r="12" fill="${color}" fill-opacity="0.2" stroke="${color}" stroke-width="1.5"/>
                        <polygon points="16,6 22,22 16,18 10,22" fill="${color}" opacity="0.9"/>
                    </g>
                </svg>`;
        }

        function createVehicleIcon(color, heading) {
            return L.divIcon({
                html: createArrowSVG(color, heading),
                className: 'vehicle-marker-icon',
                iconSize: [32, 32],
                iconAnchor: [16, 16],
                popupAnchor: [0, -16],
            });
        }

        function updateMarker(vehicle) {
            const { vid, lat, lng, spd, hdg, ign, ts } = vehicle;
            const color = getVehicleColor(vid);

            const popupContent = `
                <div class="popup-title">${vid}</div>
                <div class="popup-row"><span class="label">Speed</span><span class="value">${spd.toFixed(1)} km/h</span></div>
                <div class="popup-row"><span class="label">Heading</span><span class="value">${hdg.toFixed(0)}°</span></div>
                <div class="popup-row"><span class="label">Position</span><span class="value">${lat.toFixed(4)}, ${lng.toFixed(4)}</span></div>
                <div class="popup-row"><span class="label">Ignition</span><span class="value">${ign ? '🟢 ON' : '🔴 OFF'}</span></div>
                <div class="popup-row"><span class="label">Last Seen</span><span class="value">${new Date(ts).toLocaleTimeString()}</span></div>
            `;

            if (markers[vid]) {
                // Update existing marker position and icon rotation
                markers[vid].setLatLng([lat, lng]);
                markers[vid].setIcon(createVehicleIcon(color, hdg));
                markers[vid].setPopupContent(popupContent);
            } else {
                // Create new marker
                const marker = L.marker([lat, lng], {
                    icon: createVehicleIcon(color, hdg),
                }).addTo(map);

                marker.bindPopup(popupContent, {
                    maxWidth: 240,
                    className: 'dark-popup',
                });

                markers[vid] = marker;
            }
        }

        // ==================================================================
        // Update Sidebar Vehicle List
        // ==================================================================
        function updateSidebar(vehicles, breaches) {
            const list = document.getElementById('vehicle-list');

            // Stats
            document.getElementById('stat-vehicles').textContent = vehicles.length;
            const avgSpeed = vehicles.length > 0
                ? (vehicles.reduce((s, v) => s + v.spd, 0) / vehicles.length).toFixed(0)
                : '—';
            document.getElementById('stat-avg-speed').textContent = avgSpeed;
            document.getElementById('stat-breaches').textContent = breaches.length;

            // Build vehicle list HTML
            let html = '';
            for (const v of vehicles) {
                const color = getVehicleColor(v.vid);
                let statusClass = 'moving';
                if (!v.ign || v.spd === 0) statusClass = 'stopped';
                else if (v.spd < 25) statusClass = 'slow';

                html += `
                    <div class="vehicle-item" onclick="map.setView([${v.lat},${v.lng}],15)" id="vehicle-item-${v.vid}">
                        <div class="vehicle-status-dot ${statusClass}"></div>
                        <div class="vehicle-info">
                            <div class="vehicle-id" style="color:${color}">${v.vid}</div>
                            <div class="vehicle-detail">${v.ign ? 'Moving' : 'Stopped'} · ${v.hdg.toFixed(0)}°</div>
                        </div>
                        <div class="vehicle-speed">
                            ${v.spd.toFixed(0)} <span class="unit">km/h</span>
                        </div>
                    </div>`;
            }
            list.innerHTML = html;
        }

        // ==================================================================
        // Update Breach Notifications (Transient Toasts)
        // ==================================================================
        const PROCESSED_BREACHES = new Set();
        
        function updateBreaches(breaches) {
            if (!breaches || breaches.length === 0) return;
            
            const panel = document.getElementById('breach-panel');
            const now = Date.now();
            
            // 1. Remove expired cards (older than 8 seconds)
            Array.from(panel.children).forEach(card => {
                const tsStr = card.dataset.ts;
                if (tsStr) {
                    const elapsed = now - new Date(tsStr).getTime();
                    if (elapsed > 8000) {
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.95)';
                        // Remove from DOM after transition
                        setTimeout(() => { if (card.parentNode) card.remove(); }, 300);
                    }
                }
            });
            
            // 2. Add new valid cards
            // Reverse so we process oldest first, inserting at top pushes older down naturally
            breaches.slice(0, 5).reverse().forEach(b => {
                const id = b.vid + b.ts;
                const elapsed = now - new Date(b.ts).getTime();
                
                // Only show if it's recent (< 8s) and we haven't rendered it yet
                if (elapsed <= 8000 && !PROCESSED_BREACHES.has(id)) {
                    PROCESSED_BREACHES.add(id);
                    
                    const card = document.createElement('div');
                    card.className = 'breach-card flash';
                    card.dataset.ts = b.ts;
                    card.innerHTML = `
                        <span class="breach-vid">${b.vid}</span>
                        ${b.event} <strong>${b.zone}</strong>
                        <div class="breach-time">${new Date(b.ts).toLocaleTimeString()}</div>
                    `;
                    panel.prepend(card);
                }
            });
        }

        // ==================================================================
        // WebSocket Connection
        // ==================================================================
        let ws = null;

        function connectWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                document.getElementById('ws-dot').className = 'dot connected';
                document.getElementById('ws-label').textContent = 'live';
                document.getElementById('meta-info').textContent = `Connected · ${new Date().toLocaleTimeString()}`;
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'positions') {
                    for (const v of data.vehicles) {
                        updateMarker(v);
                    }
                    updateSidebar(data.vehicles, data.breaches || []);
                    updateBreaches(data.breaches || []);
                    document.getElementById('meta-info').textContent =
                        `${data.vehicles.length} vehicles · ${new Date().toLocaleTimeString()}`;
                }
            };

            ws.onclose = () => {
                document.getElementById('ws-dot').className = 'dot disconnected';
                document.getElementById('ws-label').textContent = 'offline';
                document.getElementById('meta-info').textContent = 'Disconnected — reconnecting...';
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = () => ws.close();
        }

        connectWebSocket();
    </script>
</body>
</html>

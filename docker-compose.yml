# ============================================================================
# docker-compose.yml — Distributed Spatio-Temporal Fleet Tracker Infrastructure
# ============================================================================
# Why docker-compose? It gives us a single-command way to bring up the entire
# infrastructure stack.  Each service has a health-check so dependent services
# can wait until the infrastructure is genuinely ready, not just "port open".
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # 1. Mosquitto — MQTT Broker
  # We use Mosquitto because it is the de-facto lightweight MQTT broker.
  # Vehicles publish telemetry to MQTT because MQTT was designed for
  # high-frequency, low-overhead IoT messaging.
  # --------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fleet-mosquitto
    ports:
      - "1883:1883"   # MQTT TCP
      - "9001:9001"   # MQTT WebSocket (optional, useful for browser debugging)
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      # mosquitto_pub with --help always exits 0; we only need the binary to exist
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t '$$SYS/health' -m 'ping' -q 0 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------------
  # 2. Zookeeper — Required by Kafka for leader election / metadata
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fleet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # Use the built-in AdminServer (port 8080) — ruok command requires
      # explicit enablement and nc isn't available in the Confluent image
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/commands/ruok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------------
  # 3. Kafka — Central event backbone
  # Why Kafka? It decouples producers (MQTT bridge) from consumers (processor)
  # and gives us durable, replayable, partitioned streams — perfect for high-
  # throughput telemetry.
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fleet-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: one for inter-container traffic, one for the host
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # --------------------------------------------------------------------------
  # 4. Redis — Hot cache for live vehicle positions
  # Why Redis? Sub-millisecond reads make it ideal for the "where are all
  # vehicles RIGHT NOW?" query that the WebSocket endpoint serves every second.
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fleet-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------------
  # 5. TimescaleDB — Time-series optimised Postgres
  # Why TimescaleDB? Hypertables automatically partition data by time,
  # giving us fast range-scans for "last 30 minutes of pings" without
  # manual partitioning.  PostGIS adds spatial indexing if needed later.
  # --------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fleet-timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleetdb
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleetdb"]
      interval: 5s
      timeout: 3s
      retries: 15
